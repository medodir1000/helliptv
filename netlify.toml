# Netlify config for the HellIPTV single-page app (Vite + React Router).

[build]
  command = "npm run build"
  publish = "dist"

# VAPID_SUBJECT is a public mailto, and the VITE_* keys are inlined into the client
# bundle by design — none of these are secrets. Netlify's secret scanner was failing
# EVERY deploy because VAPID_SUBJECT's value appears in committed files, so tell it to
# skip the public keys. Real secrets (OPENROUTER_API_KEY, VAPID_PRIVATE_KEY) stay scanned.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VAPID_SUBJECT,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_VAPID_PUBLIC_KEY"

# Security headers (mirror of vercel.json, applied by Netlify).
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"

# API → Netlify functions (must come BEFORE the SPA catch-all).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — every route is served by index.html so /blog, /blog/:slug,
# /admin, /pricing … are handled client-side by React Router (must be LAST).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
