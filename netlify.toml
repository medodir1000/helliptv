# Netlify config for the HellIPTV single-page app (Vite + React Router).

[build]
  command = "npm run build"
  publish = "dist"

# Security headers (mirror of vercel.json, applied by Netlify).
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"

# SPA fallback — every route is served by index.html so /blog, /blog/:slug,
# /admin, /pricing … are handled client-side by React Router (must be LAST).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
